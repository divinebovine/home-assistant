# lovelace/lock_codes.yaml
#
# YAML-defined dashboard for managing lock entry codes.
# Registered via lovelace/dashboards.yaml — see that file for setup instructions.

views:
  - title: Lock Codes
    path: lock-codes
    icon: mdi:lock
    cards:

      - type: markdown
        content: |
          ## 🔐 Lock Code Manager
          Enter a **Name** and **PIN** for each slot, then toggle **Enabled** on to
          write the code to both locks. Toggle **Notify** on to receive a push
          notification when that code is used to unlock a door.

      - type: grid
        columns: 2
        square: false
        cards:

          # ── Slot 1 ──────────────────────────────────────────────────────────
          - type: entities
            title: "Slot 1"
            show_header_toggle: false
            entities:
              - entity: input_text.lock_code_slot_1_name
                name: Name
                icon: mdi:account
              - entity: input_text.lock_code_slot_1_pin
                name: PIN
                icon: mdi:numeric
              - type: divider
              - entity: input_boolean.lock_code_slot_1_enabled
                name: Enabled
              - entity: input_boolean.lock_code_slot_1_notify
                name: Notify on Use

          # ── Slot 2 ──────────────────────────────────────────────────────────
