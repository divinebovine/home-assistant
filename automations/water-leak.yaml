###############################################################
# Water Leak Detection Automations
#
# Hardware:
#   - Aeotec 8 Water Sensors (Z-Wave)
#
# Monitored Sensors:
#   - binary_sensor.water_heater_water_sensor_water_leak_detected
#   - binary_sensor.kitchen_sink_water_sensor_water_leak_detected
#
# Logic:
#   - Triggers on any water sensor reporting a leak
#   - Sends immediate critical alert with sensor location
#   - Sends all-clear notification when leak is resolved
###############################################################

# ----------------------------------------------------------
# AUTOMATION 1: Water Leak Detected
# ----------------------------------------------------------
- id: water_leak_detected
  alias: "Safety - Water Leak Detected"
  description: >
    Sends an immediate critical alert when any water sensor detects a leak.

  trigger:
    - platform: state
      # Add new sensors here as they are installed
      entity_id:
        - binary_sensor.water_heater_water_sensor_water_leak_detected
        - binary_sensor.kitchen_sink_water_sensor_water_leak_detected
      to: "on"

  action:
    - service: notify.mobile_app_pixel_8_pro
      data:
        title: "💧🚨 Water Leak Detected"
        message: >
          Water leak detected at:
          {{ trigger.to_state.attributes.friendly_name }}

          Check the area immediately to prevent water damage.
        data:
          channel: "Emergency Alerts"
          importance: max
          ttl: 0
          priority: high
          color: red
          persistent: true

  mode: parallel
  max: 10
  max_exceeded: silent

# ----------------------------------------------------------
# AUTOMATION 2: Water Leak Cleared
# ----------------------------------------------------------
- id: water_leak_cleared
  alias: "Safety - Water Leak Cleared"
  description: >
    Sends an all-clear notification when a water sensor returns to dry.

  trigger:
    - platform: state
      # Add new sensors here as they are installed
      entity_id:
        - binary_sensor.water_heater_water_sensor_water_leak_detected
        - binary_sensor.kitchen_sink_water_sensor_water_leak_detected
      from: "on"
      to: "off"

  action:
    - service: notify.mobile_app_pixel_8_pro
      data:
        title: "✅ Water Leak Cleared"
        message: >
          {{ trigger.to_state.attributes.friendly_name }} is now dry.
          Please check for any water damage.
        data:
          channel: "Emergency Alerts"
          importance: high
          ttl: 0
          priority: normal
          color: green

  mode: parallel
  max: 10
  max_exceeded: silent
