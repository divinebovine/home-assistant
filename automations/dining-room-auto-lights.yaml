###############################################################
# Dining Room Auto Lights
#
# Hardware:
#   - Kitchen Q-Sensor (temporary placement in dining room)
#   - Z-Wave light switch/dimmer for dining room lights
#   - Input boolean helper for manual override control
#   - Timer helper for 30-minute auto-off countdown
#
# Monitored Entities:
#   - binary_sensor.kitchen_q_sensor_motion_detection : Motion detection trigger
#   - input_boolean.dining_room_auto_lights           : Enable/disable switch
#   - timer.dining_room_lights_on_timer               : 30-minute countdown timer
#   - light.dining_room_lights                        : Target light entity
#
# Logic:
#   - Motion activation with time-based brightness levels:
#     * 07:00-23:00 (Day): 100% brightness
#     * 23:00-00:00 (Evening): 60% brightness
#     * 00:00-07:00 (Night): 10% brightness
#   - Always restarts 30-minute timer on motion detection
#   - Adjusts brightness even if lights are already on
#   - Auto-turns off when timer expires
#   - Startup logic ensures lights are off if timer is idle
#   - Manual override via input_boolean prevents activation
###############################################################

alias: Dining Room Auto Lights
labels:
  - lighting
description: "Motion-activated dining room lights with time-based brightness levels. Turns on at 100% (day), 60% (evening), or 10% (night), then auto-turns off after 30 minutes."
triggers:
  - trigger: state
    entity_id: binary_sensor.kitchen_q_sensor_motion_detection
    from: "off"
    to: "on"
    id: Kitchen Motion On
  - trigger: state
    entity_id:
      - timer.dining_room_lights_on_timer
    from:
      - active
    to:
      - idle
    id: Timer
  - trigger: homeassistant
    event: start
    id: Startup
conditions: []
actions:
  - choose:
      - conditions:
          - condition: time
            after: "07:00:00"
            before: "23:00:00"
            weekday:
              - sun
              - mon
              - tue
              - wed
              - thu
              - fri
              - sat
          - condition: state
            entity_id: input_boolean.dining_room_auto_lights
            state:
              - "on"
          - condition: trigger
            id:
              - Kitchen Motion On
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_room_dining_room_lights
            data:
              transition: 2
              brightness_pct: 100
          - action: timer.start
            target:
              entity_id: timer.dining_room_lights_on_timer
            data:
              duration: "00:30:00"
      - conditions:
          - condition: time
            after: "23:00:00"
            before: "12:00:00"
            weekday:
              - sun
              - mon
              - tue
              - wed
              - thu
              - fri
              - sat
          - condition: state
            entity_id: input_boolean.dining_room_auto_lights
            state:
              - "on"
          - condition: trigger
            id:
              - Kitchen Motion On
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining_room_lights
            data:
              transition: 2
              brightness_pct: 60
          - action: timer.start
            target:
              entity_id: timer.dining_room_lights_on_timer
            data:
              duration: "00:30:00"
      - conditions:
          - condition: time
            after: "00:00:00"
            before: "07:00:00"
            weekday:
              - sun
              - mon
              - tue
              - wed
              - thu
              - fri
              - sat
          - condition: state
            entity_id: input_boolean.dining_room_auto_lights
            state:
              - "on"
          - condition: trigger
            id:
              - Kitchen Motion On
        sequence:
          - action: light.turn_on
            target:
              device_id: d7a6241696972ed86b82d693ff88b5a9
            data:
              transition: 2
              brightness_pct: 10
          - action: timer.start
            target:
              entity_id: timer.dining_room_lights_on_timer
            data:
              duration: "00:30:00"
      - conditions:
          - condition: trigger
            id:
              - Timer
          - condition: state
            entity_id: automation.dining_room_auto_lights
            state:
              - "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.dining_room_lights
            data:
              transition: 2
      - conditions:
          - condition: trigger
            id:
              - Startup
          - condition: state
            entity_id: automation.dining_room_auto_lights
            state:
              - "on"
          - condition: state
            entity_id: timer.dining_room_lights_on_timer
            state:
              - idle
        sequence:
          - action: light.turn_off
            data:
              transition: 2
            target:
              entity_id: light.dining_room_lights
mode: restart
