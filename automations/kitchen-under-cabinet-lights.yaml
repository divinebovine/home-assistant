###############################################################
# Kitchen Under Cabinet Lights Control
#
# Hardware:
#   - Zooz ZEN56 RGBW Dimmer (Kitchen Under Cabinet Dimmer)
#   - Zooz ZEN35 Scene Controller (Kitchen Scene Controller)
#
# Entities:
#   - light.kitchen_under_cabinet_dimmer          : Under cabinet light
#   - node_id 262 (Kitchen Scene Controller)      : ZEN35 scene controller
#
# Button Behavior:
#   - Button 1 press      : Set to 100% brightness
#   - Button 1 hold       : Native Z-Wave ramp up (smooth, dimmer-controlled)
#   - Button 1 release    : Stop ramp at current brightness
#   - Button 3 press      : Turn off
#   - Button 3 hold       : Native Z-Wave ramp down (smooth, dimmer-controlled)
#   - Button 3 release    : Stop ramp at current brightness
###############################################################

- id: kitchen_under_cabinet_lights_control
  alias: Kitchen - Under Cabinet Lights Control
  description: "Controls under cabinet lights via ZEN35 scene controller. Button 1 raises brightness, button 3 lowers to off."
  triggers:
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyPressed
      id: button_1_press
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyHeldDown
      id: button_1_hold
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyReleased
      id: button_1_release
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyPressed
      id: button_3_press
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyHeldDown
      id: button_3_hold
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyReleased
      id: button_3_release

  actions:
    - choose:
        # Button 1 press — jump to full brightness
        - conditions:
            - condition: trigger
              id: button_1_press
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.kitchen_under_cabinet_dimmer
              data:
                brightness_pct: 100
                transition: 1

        # Button 1 hold — native Z-Wave ramp up; dimmer handles smooth transition
        - conditions:
            - condition: trigger
              id: button_1_hold
          sequence:
            - action: zwave_js.invoke_cc_api
              data:
                entity_id: light.kitchen_under_cabinet_dimmer
                command_class: 38
                endpoint: 0
                method_name: startLevelChange
                parameters:
                  - direction: up
                    ignoreStartLevel: true
                    startLevel: 0

        # Button 1 release — stop ramp at current level
        - conditions:
            - condition: trigger
              id: button_1_release
          sequence:
            - action: zwave_js.invoke_cc_api
              data:
                entity_id: light.kitchen_under_cabinet_dimmer
                command_class: 38
                endpoint: 0
                method_name: stopLevelChange
                parameters: []

        # Button 3 press — turn off immediately, overriding the dimmer's ramp rate
        - conditions:
            - condition: trigger
              id: button_3_press
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.kitchen_under_cabinet_dimmer
              data:
                transition: 0

        # Button 3 hold — native Z-Wave ramp down; dimmer handles smooth transition
        - conditions:
            - condition: trigger
              id: button_3_hold
          sequence:
            - action: zwave_js.invoke_cc_api
              data:
                entity_id: light.kitchen_under_cabinet_dimmer
                command_class: 38
                endpoint: 0
                method_name: startLevelChange
                parameters:
                  - direction: down
                    ignoreStartLevel: true
                    startLevel: 99

        # Button 3 release — stop ramp at current level
        - conditions:
            - condition: trigger
              id: button_3_release
          sequence:
            - action: zwave_js.invoke_cc_api
              data:
                entity_id: light.kitchen_under_cabinet_dimmer
                command_class: 38
                endpoint: 0
                method_name: stopLevelChange
                parameters: []

  mode: queued
  max: 4
  max_exceeded: silent
