###############################################################
# Kitchen Under Cabinet Lights Control
#
# Hardware:
#   - Zooz ZEN56 RGBW Dimmer (Kitchen Under Cabinet Dimmer)
#   - Zooz ZEN35 Scene Controller (Kitchen Scene Controller)
#
# Entities:
#   - light.kitchen_under_cabinet_dimmer          : Under cabinet light
#   - node_id 262 (Kitchen Scene Controller)      : ZEN35 scene controller
#
# Button Behavior:
#   - Button 1 press      : Set to 100% brightness
#   - Button 1 hold       : Step up brightness 10% per 500ms until 100% or released
#   - Button 1 release    : Stop at current brightness
#   - Button 3 press      : Turn off
#   - Button 3 hold       : Step down brightness 10% per 500ms until off or released
#   - Button 3 release    : Stop at current brightness
###############################################################

- id: kitchen_under_cabinet_lights_control
  alias: Kitchen - Under Cabinet Lights Control
  description: "Controls under cabinet lights via ZEN35 scene controller. Button 1 raises brightness, button 3 lowers to off."
  triggers:
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyPressed
      id: button_1_press
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyHeldDown
      id: button_1_hold
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 001"
        value: KeyReleased
      id: button_1_release
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyPressed
      id: button_3_press
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyHeldDown
      id: button_3_hold
    - trigger: event
      event_type: zwave_js_value_notification
      event_data:
        node_id: 262
        label: "Scene 003"
        value: KeyReleased
      id: button_3_release

  actions:
    - choose:
        # Button 1 press — jump to full brightness
        - conditions:
            - condition: trigger
              id: button_1_press
          sequence:
            - action: light.turn_on
              target:
                entity_id: light.kitchen_under_cabinet_dimmer
              data:
                brightness_pct: 100
                transition: 1

        # Button 1 hold — step up 10% every 500ms until 100% or released.
        # mode: restart cancels this loop the moment KeyReleased fires.
        - conditions:
            - condition: trigger
              id: button_1_hold
          sequence:
            - repeat:
                count: 10
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.kitchen_under_cabinet_dimmer
                    data:
                      brightness_step_pct: 10
                      transition: 0.4
                  - delay:
                      milliseconds: 500

        # Button 3 press — turn off
        - conditions:
            - condition: trigger
              id: button_3_press
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.kitchen_under_cabinet_dimmer
              data:
                transition: 1

        # Button 3 hold — step down 10% every 500ms until off or released.
        # mode: restart cancels this loop the moment KeyReleased fires.
        - conditions:
            - condition: trigger
              id: button_3_hold
          sequence:
            - repeat:
                count: 10
                sequence:
                  - choose:
                      # At minimum brightness — turn off and stop
                      - conditions:
                          - condition: template
                            value_template: >
                              {{ state_attr('light.kitchen_under_cabinet_dimmer', 'brightness') | int(255) <= 26 }}
                        sequence:
                          - action: light.turn_off
                            target:
                              entity_id: light.kitchen_under_cabinet_dimmer
                          - stop: "Light reached minimum, turning off"
                    default:
                      - action: light.turn_on
                        target:
                          entity_id: light.kitchen_under_cabinet_dimmer
                        data:
                          brightness_step_pct: -10
                          transition: 0.4
                  - delay:
                      milliseconds: 500

        # Button 1/3 release — loop is already cancelled by mode: restart.
        # No action needed; light remains at current level.
        - conditions:
            - condition: trigger
              id:
                - button_1_release
                - button_3_release
          sequence: []

  mode: restart
  max_exceeded: silent
