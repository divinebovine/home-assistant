###############################################################
# Office Auto Lights Toggle Override
#
# Hardware:
#   - Zooz ZEN30 800LR dimmer (main paddle controls office light)
#
# Monitored Entities:
#   - event.office_dimmer_scene_001      : Paddle up scene event
#   - event.office_dimmer_scene_002      : Paddle down scene event
#   - input_boolean.office_auto_lights   : Auto-lights enable switch
#   - timer.office_auto_lights_off_timer : 1-hour temporary override timer
#
# Logic:
#   - Both paddle up/down temporarily disable auto-lights
#   - Starts 1-hour override timer when paddle is pressed
#   - Re-enables auto-lights when timer expires
#   - Startup logic ensures auto-lights are enabled by default
###############################################################

alias: Office Auto Lights Toggle
description: "Manual override for office auto-lights using ZEN30 paddle. Both up/down disable auto-lights temporarily, then re-enable after 1 hour."
triggers:
  - trigger: event
    event_type: zwave_js_value_notification
    event_data:
      entity_id: event.office_dimmer_scene_001
    id: Paddle Up
  - trigger: event
    event_type: zwave_js_value_notification
    event_data:
      entity_id: event.office_dimmer_scene_002
    id: Paddle Down
  - trigger: state
    entity_id: timer.office_auto_lights_off_timer
    from: active
    to: idle
    id: Timer
  - trigger: homeassistant
    event: start
    id: Home Assistant Start
actions:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - Paddle Up
              - Paddle Down
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.office_auto_lights
          - action: timer.start
            target:
              entity_id: timer.office_auto_lights_off_timer

      - conditions:
          - condition: trigger
            id: Timer
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.office_auto_lights

      - conditions:
          - condition: trigger
            id: Home Assistant Start
          - condition: state
            entity_id: input_boolean.office_auto_lights
            state: "off"
          - condition: state
            entity_id: timer.office_auto_lights_off_timer
            state: idle
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.office_auto_lights
mode: single
