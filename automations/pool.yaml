###############################################################
# Pool Pump Automations
#
# Sensors used:
#   - sensor.pool_vsf_gpm   : Pool pump flow rate (GPM)
#   - sensor.pool_vsf_rpm   : Pool pump motor speed (RPM)
#   - switch.pool_pump      : Pool pump on/off
#
# Helper required (create in HA under Settings > Helpers > Toggle):
#   - input_boolean.pool_skimmer_clogged
#
# Automation 1 — Skimmer Clog Monitor:
#   - Normal operating range: 3,000–3,450 RPM / ~80 GPM
#   - Alert triggers when GPM drops 15%+ below 80 GPM (i.e., <= 68 GPM)
#     WHILE RPM remains >= 3,000 RPM
#   - Condition must persist for 5 minutes before notifying
#   - Re-notifies after 30 minutes if the problem is not resolved
#   - Shuts off the pump after 1 hour if still clogged
#   - Sends a clear notification when flow rate recovers (only if a clog
#     was previously detected — prevents false "restored" alerts on pump startup)
#
# Automation 2 — Low RPM Alert:
#   - Alerts when pump is on but RPM drops below minimum (450 RPM)
#   - Waits 2 minutes before alerting to avoid false triggers on startup
#   - Sends a clear notification when RPM recovers
###############################################################

- id: pool_skimmer_clog_monitor
  alias: "Pool - Skimmer Clog Monitor"
  description: >
    Single automation that monitors pool pump GPM and RPM.
    Alerts when flow drops 15%+ below normal while RPM stays high
    (indicating clogged skimmers), re-notifies after 30 minutes,
    shuts off the pump after 1 hour, and confirms when the issue is resolved.

  trigger:
    # Fires when GPM drops into clogged range
    - platform: numeric_state
      id: clogged
      entity_id: sensor.pool_vsf_gpm
      below: 68
      for:
        minutes: 5

    # Fires when GPM recovers to normal range
    - platform: numeric_state
      id: recovered
      entity_id: sensor.pool_vsf_gpm
      above: 68
      for:
        minutes: 5

  action:
    - choose:
        # ----------------------------------------------------------
        # CASE 1: GPM dropped — skimmers likely clogged
        # ----------------------------------------------------------
        - conditions:
            - condition: trigger
              id: clogged
            # Confirm RPM is still in normal range (not intentional low speed)
            - condition: numeric_state
              entity_id: sensor.pool_vsf_rpm
              above: 2999

          sequence:
            # Mark clog as active
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.pool_skimmer_clogged

            # Send initial clog alert
            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "🏊 Pool Skimmer Alert"
                message: >
                  Skimmers may be clogged! Flow rate has dropped to
                  {{ states('sensor.pool_vsf_gpm') | round(1) }} GPM
                  (normal: ~80 GPM) while pump RPM is
                  {{ states('sensor.pool_vsf_rpm') | round(0) }}.
                  Please check and clean the skimmer baskets.
                data:
                  channel: "Pool Alerts"
                  importance: high
                  ttl: 0
                  priority: high

            # Re-notify after 30 minutes if still clogged
            - delay:
                minutes: 30

            # Re-check after 30 min delay before sending reminder
            - condition: numeric_state
              entity_id: sensor.pool_vsf_gpm
              below: 68
            - condition: numeric_state
              entity_id: sensor.pool_vsf_rpm
              above: 2999

            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "🏊 Pool Skimmer Still Clogged"
                message: >
                  Reminder: Skimmers are still clogged!
                  Current flow rate is
                  {{ states('sensor.pool_vsf_gpm') | round(1) }} GPM
                  (normal: ~80 GPM). Pump RPM is
                  {{ states('sensor.pool_vsf_rpm') | round(0) }}.
                  Please clean the skimmer baskets.
                  The pump will be shut off in 30 minutes if not resolved.
                data:
                  channel: "Pool Alerts"
                  importance: high
                  ttl: 0
                  priority: high

            # Wait another 30 minutes (1 hour total) then shut off pump if still clogged
            - delay:
                minutes: 30

            - condition: numeric_state
              entity_id: sensor.pool_vsf_gpm
              below: 68
            - condition: numeric_state
              entity_id: sensor.pool_vsf_rpm
              above: 2999

            - service: switch.turn_off
              target:
                entity_id: switch.pool_pump

            # Clear the clog flag (pump is off, no recovery notification needed)
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.pool_skimmer_clogged

            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "🏊 Pool Pump Shut Off"
                message: >
                  Pool pump has been shut off due to a persistent skimmer clog.
                  Flow rate was {{ states('sensor.pool_vsf_gpm') | round(1) }} GPM
                  for over 1 hour. Please clean the skimmer baskets and restart the pump.
                data:
                  channel: "Pool Alerts"
                  importance: high
                  ttl: 0
                  priority: high

        # ----------------------------------------------------------
        # CASE 2: GPM recovered — skimmers are clear
        # ----------------------------------------------------------
        - conditions:
            - condition: trigger
              id: recovered
            # Only notify if a clog was previously detected (prevents false alerts on pump startup)
            - condition: state
              entity_id: input_boolean.pool_skimmer_clogged
              state: "on"
            # Confirm pump is running at normal RPM
            - condition: numeric_state
              entity_id: sensor.pool_vsf_rpm
              above: 2999

          sequence:
            # Clear the clog flag
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.pool_skimmer_clogged

            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "✅ Pool Flow Rate Restored"
                message: >
                  Pool skimmers are clear! Flow rate is back to
                  {{ states('sensor.pool_vsf_gpm') | round(1) }} GPM.
                  Pump RPM: {{ states('sensor.pool_vsf_rpm') | round(0) }}.
                data:
                  channel: "Pool Alerts"

  mode: restart
  max_exceeded: silent

# ----------------------------------------------------------
# AUTOMATION 2: Alert when pump RPM drops below minimum
# ----------------------------------------------------------
- id: pool_pump_low_rpm
  alias: "Pool - Low RPM Alert"
  description: >
    Notifies when the pool pump is on but RPM drops below the
    minimum operating speed of 450 RPM. Waits 2 minutes before
    alerting to avoid false triggers during pump startup.
    Sends a clear notification when RPM recovers.

  trigger:
    - platform: numeric_state
      id: low_rpm
      entity_id: sensor.pool_vsf_rpm
      below: 450
      for:
        minutes: 2

    - platform: numeric_state
      id: rpm_recovered
      entity_id: sensor.pool_vsf_rpm
      above: 450
      for:
        minutes: 2

  action:
    - choose:
        - conditions:
            - condition: trigger
              id: low_rpm
            - condition: state
              entity_id: switch.pool_pump
              state: "on"
          sequence:
            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "🏊 Pool Pump Low RPM"
                message: >
                  Pool pump is running below minimum speed!
                  Current RPM: {{ states('sensor.pool_vsf_rpm') | round(0) }}
                  (minimum: 450 RPM).
                  The pump may be struggling or malfunctioning.
                  Please check the pump.
                data:
                  channel: "Pool Alerts"
                  importance: high
                  ttl: 0
                  priority: high

        - conditions:
            - condition: trigger
              id: rpm_recovered
            - condition: state
              entity_id: switch.pool_pump
              state: "on"
          sequence:
            - service: notify.mobile_app_pixel_8_pro
              data:
                title: "✅ Pool Pump RPM Restored"
                message: >
                  Pool pump speed has recovered.
                  Current RPM: {{ states('sensor.pool_vsf_rpm') | round(0) }}.
                data:
                  channel: "Pool Alerts"

  mode: restart
  max_exceeded: silent
