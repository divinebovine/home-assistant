# Open Sprinkler Irrigation Schedule
#
# Runs zones 1-4 and 6-8 for 3 minutes each (cycle 1: 06:00–06:21),
# waits 1.5 hours, then repeats (cycle 2: 07:51–08:12).
# Fires on Tuesdays and Saturdays at 6:00 AM.
#
# REQUIREMENTS:
#   - Home Assistant timezone must be set to America/Chicago
#     (configuration.yaml → homeassistant: time_zone: America/Chicago)
#   - This file must be included via:
#     automation: !include_dir_merge_list automations/
#   - NWS weather integration must be configured. Find your weather entity at:
#     Settings → Devices & Services → National Weather Service
#     Update the WEATHER ENTITY constant near the top of the action block.
#   - The ET deficit helper must exist. Create it via:
#     Settings → Devices & Services → Helpers → Add Helper → Number
#       Name:     Irrigation ET Deficit
#       Entity ID: input_number.irrigation_et_deficit
#       Min: -5, Max: 10, Step: 0.01, Unit: in
#     Or use the companion helpers.yaml (see irrigation_helpers.yaml).
#
# SKIP LOGIC:
#   1. RAIN SKIP — Skips the entire watering day if NWS reports ≥ 0.25 in of
#      precipitation in the past 24 hours (attribute: precipitation_last_24hr
#      on the NWS weather entity).
#   2. ET DEFICIT SKIP — A daily automation (see below) accumulates a rolling
#      water deficit using the ASCE Standardized Penman-Monteith ET₀ equation
#      (short reference / grass), as recommended by Texas A&M AgriLife and the
#      TexasET network. Watering is skipped when the deficit is below a threshold
#      (default: 0.20 in), meaning the lawn has enough water. After each
#      watering run, the deficit is reset to 0.
#
# ENTITY IDs:
#   Replace the switch entity IDs below to match your station names.
#   Find them at Settings → Devices & Services → OpenSprinkler.
#   Format: switch.<station_name>_station_enabled
#   Example: a station named "Front Lawn" → switch.front_lawn_station_enabled
#
# RESTART RESILIENCE:
#   Each zone uses a fixed clock-time trigger rather than chained delays.
#   If Home Assistant restarts, any triggers that already fired are simply
#   skipped; all remaining zones for that day fire at their scheduled times.
#   The hardware timer (run_seconds) ensures each zone stops correctly
#   regardless of HA state.

# ══════════════════════════════════════════════════════════════════════════════
# AUTOMATION 1 OF 3 — Main irrigation schedule with skip conditions
# ══════════════════════════════════════════════════════════════════════════════
- alias: "Open Sprinkler - Irrigation Schedule"
  id: "open_sprinkler_irrigation_schedule"
  description: >
    Zones 1-4 and 6-8, 3 min each. Two cycles separated by a 1.5-hour break.
    Runs Tue/Sat at 6:00 AM Central. Restart-resilient via fixed time triggers.
    Skips if recent rain ≥ 0.25 in OR ET deficit < 0.20 in.
  mode: single
  trigger:
    # ── Cycle 1: 06:00–06:21 ─────────────────────────────────────────────
    - platform: time
      at: "06:00:00"
      id: c1_z1
    - platform: time
      at: "06:03:00"
      id: c1_z2
    - platform: time
      at: "06:06:00"
      id: c1_z3
    - platform: time
      at: "06:09:00"
      id: c1_z4
    - platform: time
      at: "06:12:00"
      id: c1_z6
    - platform: time
      at: "06:15:00"
      id: c1_z7
    - platform: time
      at: "06:18:00"
      id: c1_z8
    # ── Cycle 2: 07:51–08:12 (1.5-hour break after cycle 1 ends) ────────
    - platform: time
      at: "07:51:00"
      id: c2_z1
    - platform: time
      at: "07:54:00"
      id: c2_z2
    - platform: time
      at: "07:57:00"
      id: c2_z3
    - platform: time
      at: "08:00:00"
      id: c2_z4
    - platform: time
      at: "08:03:00"
      id: c2_z6
    - platform: time
      at: "08:06:00"
      id: c2_z7
    - platform: time
      at: "08:09:00"
      id: c2_z8
  condition:
    # ── Day-of-week gate ──────────────────────────────────────────────────
    - condition: time
      weekday:
        - tue
        - sat

    # ── Rain skip: bypass if NWS reports ≥ 0.25 in of rain in past 24 hr ─
    # Update "weather.kads" to match your NWS weather entity ID.
    # You can find it at Settings → Devices & Services → National Weather Service.
    - condition: template
      alias: "Skip if recent rainfall >= 0.25 in"
      value_template: >
        {% set weather_entity = 'weather.kads' %}
        {% set rain = state_attr(weather_entity, 'precipitation_last_24hr') | float(0) %}
        {{ rain < 0.25 }}

    # ── ET deficit skip: only water when the lawn actually needs it ───────
    - condition: template
      alias: "Skip if ET deficit is below threshold (lawn has enough water)"
      value_template: >
        {{ states('input_number.irrigation_et_deficit') | float(0) >= 0.20 }}

  action:
    # ── Reset ET deficit after a watering run starts ──────────────────────
    # Only reset on the very first trigger of the day (c1_z1) so the deficit
    # isn't zeroed out mid-schedule for triggers c1_z2 through c2_z8.
    - if:
        - condition: template
          value_template: "{{ trigger.id == 'c1_z1' }}"
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.irrigation_et_deficit
          data:
            value: 0

    # ── Map each trigger ID to the corresponding station entity ──────────
    - variables:
        station_entity:
          c1_z1: switch.s01_station_enabled
          c1_z2: switch.s02_station_enabled
          c1_z3: switch.s03_station_enabled
          c1_z4: switch.s04_station_enabled
          c1_z6: switch.s06_station_enabled
          c1_z7: switch.s07_station_enabled
          c1_z8: switch.s08_station_enabled
          c2_z1: switch.s01_station_enabled
          c2_z2: switch.s02_station_enabled
          c2_z3: switch.s03_station_enabled
          c2_z4: switch.s04_station_enabled
          c2_z6: switch.s06_station_enabled
          c2_z7: switch.s07_station_enabled
          c2_z8: switch.s08_station_enabled

    - if:
        - condition: template
          value_template: "{{ trigger.id in station_entity }}"
      then:
        - service: opensprinkler.run_station
          target:
            entity_id: "{{ station_entity[trigger.id] }}"
          data:
            run_seconds: 180

# ══════════════════════════════════════════════════════════════════════════════
# AUTOMATION 2 OF 3 — Daily ET deficit accumulator (runs at 8:00 PM)
#
# Estimates daily evapotranspiration using the ASCE Standardized Penman-
# Monteith ET₀ equation (short reference / grass), as recommended by Texas
# A&M AgriLife and the TexasET network for Texas conditions.
#
# Formula (ASCE Manual of Engineering Practice No. 70, 2005):
#   ET₀ = (0.408·Δ·Rn + γ·[Cn/(T+273)]·u₂·(es−ea)) / (Δ + γ·(1 + Cd·u₂))
#   Cn=900, Cd=0.34  (short reference / grass)
#   Δ  = slope of saturation vapor pressure curve (kPa/°C)
#   Rn = net radiation (MJ/m²/day); estimated via Hargreaves Rs from T-range
#        since NWS does not supply solar radiation directly
#   Ra = extraterrestrial radiation from monthly lookup table for 33°N (DFW)
#   γ  = psychrometric constant at site elevation (kPa/°C)
#   u₂ = wind speed at 2 m (converted from NWS 10 m via log-profile: ×0.748)
#   es = mean saturation vapor pressure from Tmax and Tmin (kPa)
#   ea = actual vapor pressure from RH (kPa)
#
# Deficit increases each day the lawn loses water to ET.
# Deficit decreases when it rains (rain credited directly against deficit).
# Watering also resets the deficit to 0 (handled in Automation 1).
# ══════════════════════════════════════════════════════════════════════════════
- alias: "Open Sprinkler - Daily ET Deficit Accumulator"
  id: "open_sprinkler_et_deficit_accumulator"
  description: >
    Runs at 8 PM daily. Computes ET₀ via ASCE Standardized Penman-Monteith
    (ASCE Manual 70, short reference/grass) using NWS temperature, humidity,
    and wind speed. Tmax/Tmin from NWS daily forecast attribute. Ra from
    monthly lookup table at 33°N. Accumulates a rolling water deficit;
    credits rainfall. Update 'weather.kads' to match your NWS weather entity.
  mode: single
  trigger:
    - platform: time
      at: "20:00:00"
  action:
    - variables:
        weather_entity: "weather.kads"

        # Rainfall today from NWS (inches)
        rain_today: >
          {{ state_attr(weather_entity, 'precipitation_last_24hr') | float(0) }}

        # ── ASCE Standardized Penman-Monteith ET₀ (short reference / grass) ──
        # All intermediate values are computed inside this template block.
        # Solar radiation Rs is estimated from the temperature range via the
        # Hargreaves radiation formula (NWS does not supply Rs directly).
        # Ra uses a monthly lookup table interpolated for latitude 33°N (DFW).
        # Tmax/Tmin come from forecast[0] on the NWS weather entity; if the
        # forecast attribute is unavailable, ±10/15 °F offsets are used.
        # Wind speed is converted from 10 m (NWS) to 2 m via log-profile.
        et_estimate: >
          {# ── Site constants: DFW, TX — lat 33°N, elev ≈ 600 ft / 183 m ── #}
          {% set elev_m = 183.0 %}
          {# Euler's number — used in place of exp() which is not available #}
          {% set e = 2.718281828 %}

          {# ── Weather inputs from NWS ─────────────────────────────────── #}
          {% set rh       = state_attr(weather_entity, 'humidity')    | float(50) %}
          {% set wind_mph = state_attr(weather_entity, 'wind_speed')  | float(8)  %}
          {% set t_f      = state_attr(weather_entity, 'temperature') | float(85) %}
          {% set forecast = state_attr(weather_entity, 'forecast')                %}

          {# Tmax / Tmin from today's NWS daily forecast (°F → °C) #}
          {% set has_fc  = forecast is not none and forecast | length > 0 %}
          {% set t_max_f = forecast[0].temperature | float(t_f + 10) if has_fc else (t_f + 10) %}
          {% set t_min_f = forecast[0].templow     | float(t_f - 15) if has_fc else (t_f - 15) %}
          {% set t_max   = (t_max_f - 32) / 1.8 %}
          {% set t_min   = (t_min_f - 32) / 1.8 %}
          {% set t_mean  = (t_max + t_min) / 2   %}

          {# ── Extraterrestrial radiation Ra (MJ/m²/day) at 33°N ────────── #}
          {# Interpolated from FAO-56 Table 2.6 for 30°N and 35°N.          #}
          {% set month = now().month %}
          {% set ra_table = {
             1: 22.9,  2: 26.9,  3: 32.3,  4: 37.1,
             5: 40.5,  6: 41.9,  7: 41.3,  8: 38.4,
             9: 33.4, 10: 27.4, 11: 22.1, 12: 20.7
          } %}
          {% set ra = ra_table[month] %}

          {# ── Solar radiation Rs via Hargreaves estimation ─────────────── #}
          {# Rs = Krs × √(Tmax − Tmin) × Ra   (Krs = 0.17, interior/arid)  #}
          {% set dt = [t_max - t_min, 0] | max %}
          {% set rs = 0.17 * (dt ** 0.5) * ra %}

          {# ── Clear-sky radiation Rso (MJ/m²/day) ─────────────────────── #}
          {% set rso = (0.75 + 0.00002 * elev_m) * ra %}

          {# ── Net shortwave radiation Rns (albedo α = 0.23 for grass) ──── #}
          {% set rns = 0.77 * rs %}

          {# ── Saturation and actual vapor pressure (kPa) ───────────────── #}
          {% set es_max = 0.6108 * (e ** (17.27 * t_max / (t_max + 237.3))) %}
          {% set es_min = 0.6108 * (e ** (17.27 * t_min / (t_min + 237.3))) %}
          {% set es     = (es_max + es_min) / 2 %}
          {% set ea     = es * rh / 100 %}

          {# ── Net longwave radiation Rnl (Stefan-Boltzmann, MJ/m²/day) ─── #}
          {# σ = 4.901×10⁻⁹ MJ/m²/K⁴/day                                   #}
          {# Cloudiness function Rs/Rso clamped to [0.3, 1.0]               #}
          {% set t_max_k = t_max + 273.16 %}
          {% set t_min_k = t_min + 273.16 %}
          {% set rs_rso  = [0.3, [(rs / rso if rso > 0 else 0.7), 1.0] | min] | max %}
          {% set rnl = 0.000000004901
                     * (t_max_k ** 4 + t_min_k ** 4) / 2
                     * (0.34 - 0.14 * (ea ** 0.5))
                     * (1.35 * rs_rso - 0.35) %}

          {# ── Net radiation Rn (MJ/m²/day) ─────────────────────────────── #}
          {% set rn = rns - rnl %}

          {# ── Slope of saturation vapor pressure curve Δ (kPa/°C) ──────── #}
          {% set es_tmean = 0.6108 * (e ** (17.27 * t_mean / (t_mean + 237.3))) %}
          {% set delta    = 4098 * es_tmean / (t_mean + 237.3) ** 2 %}

          {# ── Psychrometric constant γ (kPa/°C) at site elevation ──────── #}
          {% set pressure = 101.3 * ((293 - 0.0065 * elev_m) / 293) ** 5.26 %}
          {% set gamma    = 0.000665 * pressure %}

          {# ── Wind at 2 m: mph → m/s, then 10 m → 2 m log-profile (×0.748) #}
          {% set u2 = wind_mph * 0.44704 * 0.748 %}

          {# ── ASCE PM ET₀ (mm/day): Cn=900, Cd=0.34 (short reference) ──── #}
          {% set numerator   = 0.408 * delta * rn
                             + gamma * (900 / (t_mean + 273)) * u2 * (es - ea) %}
          {% set denominator = delta + gamma * (1 + 0.34 * u2) %}
          {% set et_mm = numerator / denominator if denominator > 0 else 3.0 %}

          {# Convert mm/day → in/day; clamp to [0.02, 0.50] in/day #}
          {% set et_in = et_mm / 25.4 %}
          {{ [0.02, [et_in, 0.50] | min] | max | round(3) }}

        # Current stored deficit
        current_deficit: >
          {{ states('input_number.irrigation_et_deficit') | float(0) }}

        # New deficit: add ET, subtract rainfall, clamp to [-2, 10]
        new_deficit: >
          {% set d = current_deficit + et_estimate - rain_today %}
          {{ [[-2.0, d] | max, 10.0] | min | round(3) }}

    - service: input_number.set_value
      target:
        entity_id: input_number.irrigation_et_deficit
      data:
        value: "{{ new_deficit }}"

    # Optional notification for visibility while tuning
    - service: persistent_notification.create
      data:
        title: "Irrigation ET Update"
        message: >
          ET₀ today (ASCE PM): {{ et_estimate }} in | Rain: {{ rain_today }} in |
          Deficit: {{ current_deficit }} → {{ new_deficit }} in
          {% if new_deficit >= 0.20 %}
          ✅ Will water next scheduled day.
          {% else %}
          ⏭️ Will SKIP next scheduled watering (deficit below threshold).
          {% endif %}
        notification_id: "irrigation_et_update"

# ══════════════════════════════════════════════════════════════════════════════
# AUTOMATION 3 OF 3 — Rain credit (immediate deficit reduction on heavy rain)
#
# If NWS reports ≥ 0.5 in of rain at any point during the day, immediately
# credit that rain against the deficit so the evening accumulator doesn't
# double-count. This is optional but improves accuracy.
# ══════════════════════════════════════════════════════════════════════════════
- alias: "Open Sprinkler - Rain Credit on Heavy Rain"
  id: "open_sprinkler_rain_credit"
  description: >
    When NWS precipitation_last_24hr crosses 0.5 in, reset the ET deficit
    to 0 immediately. Prevents watering after significant rainfall.
    Update 'weather.kads' to match your NWS weather entity.
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: weather.kads
      attribute: precipitation_last_24hr
      above: 0.5
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.irrigation_et_deficit
      data:
        value: 0
    - service: persistent_notification.create
      data:
        title: "Irrigation - Rain Credit Applied"
        message: >
          Significant rainfall detected (≥ 0.5 in).
          ET deficit reset to 0. Irrigation will be skipped until deficit rebuilds.
        notification_id: "irrigation_rain_credit"
