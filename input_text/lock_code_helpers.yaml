# input_text/lock_code_helpers.yaml
#
# Place this file in: <config>/input_text/lock_code_helpers.yaml
#
# This is a NEW helper type directory. Add this line to configuration.yaml:
#   input_text: !include_dir_merge_named input_text/
#
# Two text helpers per code slot:
#   lock_code_slot_X_name — human-readable label shown in notifications
#                           (e.g., "Mom", "Dog Walker", "House Cleaner")
#   lock_code_slot_X_pin  — the numeric PIN (4–8 digits); stored in password
#                           mode so it is masked in the UI

# ── Slot 1 ───────────────────────────────────────────────────────────────────
lock_code_slot_1_name:
  name: "Lock Code Slot 1 - Name"
  icon: mdi:account
  max: 30

lock_code_slot_1_pin:
  name: "Lock Code Slot 1 - PIN"
  icon: mdi:numeric
  min: 4
  max: 8
  pattern: "[0-9]*"
  mode: password

