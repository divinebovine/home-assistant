# input_boolean/lock_code_helpers.yaml
#
# Place this file in: <config>/input_boolean/lock_code_helpers.yaml
#
# Ensure your configuration.yaml includes this directory:
#   input_boolean: !include_dir_merge_named input_boolean/
#
# Two booleans per code slot:
#   lock_code_slot_X_enabled — master on/off for the slot; toggling off immediately
#                              clears the code from the lock hardware
#   lock_code_slot_X_notify  — when on, sends a push notification each time this
#                              slot's code is used to unlock a door

# ── Slot 1 ───────────────────────────────────────────────────────────────────
lock_code_slot_1_enabled:
  name: "Lock Code Slot 1 - Enabled"
  icon: mdi:lock-check

lock_code_slot_1_notify:
  name: "Lock Code Slot 1 - Notify on Use"
  icon: mdi:bell-check

